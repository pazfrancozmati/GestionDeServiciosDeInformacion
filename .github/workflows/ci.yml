name: Simple CI/CD Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permiso necesario para que el despliegue a GitHub Pages funcione
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Validar HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Despliega solo cuando es un push a main (no en pull requests)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy a Github Pages
        uses: peaceiris/actions-gh-pages@v4  # Actualizado a v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Nombre corregido
          publish_dir: .
